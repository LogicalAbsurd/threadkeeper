<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <h1>Threadkeeper</h1>
    <span id="site-badge"></span>
  </header>

  <section id="unsupported-msg" class="notice" hidden>
    Open a supported AI chat site to begin.
  </section>

  <section id="actions" hidden>
    <div class="format-toggle">
      <label class="toggle-option">
        <input type="radio" name="format" value="markdown" checked>
        <span>Markdown</span>
      </label>
      <label class="toggle-option">
        <input type="radio" name="format" value="json">
        <span>JSON</span>
      </label>
    </div>

    <div class="button-group">
      <button id="btn-export-current" class="btn primary">Export current chat</button>
      <button id="btn-export-all" class="btn">Export all chats</button>
      <button id="btn-export-select" class="btn">Select chats to export&hellip;</button>
    </div>
  </section>

  <footer>
    <button id="btn-settings" class="link-btn" title="Settings">&#9881; Settings</button>
  </footer>

  <!-- Inline settings pane — expands in place rather than opening a separate options page.
       Keeps the UX contained; a full options page isn't warranted until there are many settings. -->
  <section id="settings-pane" hidden>
    <h2>Settings</h2>
    <label class="setting-row">
      <span>Bulk export delay (ms)</span>
      <input type="number" id="setting-delay" value="500" min="0" step="100">
    </label>
    <button id="btn-settings-close" class="link-btn">Close</button>
  </section>

  <script src="popup.js"></script>
</body>
</html>
